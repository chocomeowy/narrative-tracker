<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narrative Velocity Tracker | Autonomous Trend Intelligence</title>
    <meta name="description" content="An autonomous agent tracking global technical and cultural trends through their lifecycle.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="subtitle">Autonomous Intelligence Agent</div>
        <h1>The Narrative Velocity Tracker</h1>
        <div id="last-updated" class="subtitle" style="font-size: 0.7rem; margin-top: 1rem;">Monitoring...</div>
    </header>

    <main>
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Trends Tracked</div>
                <div id="count-total" class="stat-value">0</div>
            </div>
            <div id="top-focus" class="stat-card">
                <div class="stat-label">Primary Intelligence Focus</div>
                <div id="current-focus" class="stat-value" style="font-size: 1.2rem; margin-top: 0.5rem;">Global Tech</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Agent Status</div>
                <div class="stat-value" style="color: #10b981;">Active</div>
            </div>
        </section>

        <div id="lifecycle-map" class="lifecycle-container">
            <!-- Stages will be injected here -->
            <div id="incubation-section" class="stage-section">
                <div class="stage-header">
                    <span class="stage-badge" style="background: var(--incubation);">Incubation</span>
                    <h2 class="stage-title">Emerging Niche</h2>
                </div>
                <div id="incubation-trends" class="trends-grid"></div>
            </div>

            <div id="breakthrough-section" class="stage-section">
                <div class="stage-header">
                    <span class="stage-badge" style="background: var(--breakthrough);">Breakthrough</span>
                    <h2 class="stage-title">Early Adoption</h2>
                </div>
                <div id="breakthrough-trends" class="trends-grid"></div>
            </div>

            <div id="peak-hype-section" class="stage-section">
                <div class="stage-header">
                    <span class="stage-badge" style="background: var(--peak-hype);">Peak Hype</span>
                    <h2 class="stage-title">Mass Awareness</h2>
                </div>
                <div id="peak-hype-trends" class="trends-grid"></div>
            </div>

            <div id="fatigue-section" class="stage-section">
                <div class="stage-header">
                    <span class="stage-badge" style="background: var(--fatigue);">Fatigue</span>
                    <h2 class="stage-title">Backlash & Decline</h2>
                </div>
                <div id="fatigue-trends" class="trends-grid"></div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
